# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration for the RISE Tech Village Poster Design Agent.
#
# IMPORTANT: sqlalchemy.url is intentionally left blank here.
# It is set dynamically in migrations/env.py by reading DATABASE_SYNC_URL
# from the environment — so secrets never live in this file.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
# Format: YYYY-MM-DD_HH-MM-SS_short_description.py
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d-%%(minute).2d-%%(second).2d_%%(slug)s

# sys.path addition for env.py to import app modules
prepend_sys_path = .

# Do NOT set sqlalchemy.url here — it is loaded from env vars in env.py
# sqlalchemy.url =

# Timezone for generated timestamps in migration files
timezone = Asia/Colombo

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
